<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample Application - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 420px;
            padding: 40px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: white;
            margin-bottom: 10px;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            margin-top: 30px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .error-message {
            background-color: #fee;
            color: #c33;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            border-left: 4px solid #c33;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .help-text {
            margin-top: 20px;
            padding: 15px;
            background-color: #f0f4ff;
            border-radius: 8px;
            font-size: 13px;
            color: #555;
            border-left: 4px solid #667eea;
        }

        .help-text strong {
            color: #333;
            display: block;
            margin-bottom: 8px;
        }

        .credentials {
            font-family: 'Courier New', monospace;
            background-color: white;
            padding: 8px;
            border-radius: 4px;
            margin-top: 8px;
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            color: #666;
            font-size: 12px;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">🔐</div>
            <h1>Sample Application</h1>
            <p class="subtitle">Robot Framework Test Demo</p>
        </div>

        <div id="error-container" class="error-message"></div>

        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Enter your username"
                    autocomplete="username"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter your password"
                    autocomplete="current-password"
                    required
                >
            </div>

            <div class="button-group">
                <button type="submit" id="login-button">Sign In</button>
            </div>
        </form>

        <div class="loading">
            <div class="spinner"></div>
        </div>

        <div class="help-text">
            <strong>Test Credentials:</strong>
            <div class="credentials">
                Username: <strong>demo_user</strong><br>
                Password: <strong>demo_pass</strong>
            </div>
            <div style="margin-top: 8px; font-size: 12px; color: #888;">
                This is a demo page for Robot Framework testing
            </div>
        </div>

        <div class="footer">
            © 2024 Sample Application | For Testing Purposes Only
        </div>
    </div>

    <script>
        // Valid credentials
        const VALID_CREDENTIALS = {
            'demo_user': 'demo_pass',
            'admin': 'admin123',
            'testuser': 'test123'
        };

        // Get form elements
        const loginForm = document.getElementById('login-form');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const errorContainer = document.getElementById('error-container');
        const loadingDiv = document.querySelector('.loading');

        // Show error message
        function showError(message) {
            errorContainer.textContent = message;
            errorContainer.classList.add('show');

            // Remove error after 5 seconds
            setTimeout(() => {
                errorContainer.classList.remove('show');
            }, 5000);
        }

        // Hide error message
        function hideError() {
            errorContainer.classList.remove('show');
        }

        // Validate credentials
        function validateCredentials(username, password) {
            return VALID_CREDENTIALS[username] === password;
        }

        // Handle form submission
        loginForm.addEventListener('submit', function(event) {
            event.preventDefault();
            hideError();

            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            // Basic validation
            if (!username) {
                showError('Please enter a username');
                usernameInput.focus();
                return;
            }

            if (!password) {
                showError('Please enter a password');
                passwordInput.focus();
                return;
            }

            // Show loading
            loadingDiv.classList.add('show');
            loginForm.style.display = 'none';

            // Simulate network delay
            setTimeout(() => {
                if (validateCredentials(username, password)) {
                    // Store user in sessionStorage
                    sessionStorage.setItem('user', username);
                    sessionStorage.setItem('loginTime', new Date().toISOString());

                    // Redirect to dashboard
                    window.location.href = 'dashboard.html';
                } else {
                    // Show error
                    loadingDiv.classList.remove('show');
                    loginForm.style.display = 'block';
                    showError('Invalid username or password. Please try again.');
                    passwordInput.value = '';
                    passwordInput.focus();
                }
            }, 800);
        });

        // Clear error on input
        usernameInput.addEventListener('input', hideError);
        passwordInput.addEventListener('input', hideError);

        // Check if already logged in
        window.addEventListener('load', function() {
            const user = sessionStorage.getItem('user');
            if (user) {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
